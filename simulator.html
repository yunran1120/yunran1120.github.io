<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
// 先执行我们的重写，把事件注册的口子堵上
const originalAdd = EventTarget.prototype.addEventListener;
EventTarget.prototype.addEventListener = function(type, listener, options) {
    if(['blur', 'visibilitychange', 'focusout', 'mouseleave'].includes(type)) {
        return;
    }
    return originalAdd.call(this, type, listener, options);
};

// 锁死状态
document.hasFocus = () => true;
Object.defineProperty(document, 'visibilityState', {value: 'visible', writable: false, configurable: false});
Object.defineProperty(document, 'hidden', {value: false, writable: false, configurable: false});
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #303133;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #606266;
            font-size: 14px;
        }
        .status-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .status-panel h3 {
            color: #303133;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ebeef5;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f7fa;
        }
        .status-item span:first-child {
            color: #606266;
        }
        .status-item span:last-child {
            color: #303133;
            font-weight: 500;
        }
        .alert {
            margin-top: 15px;
            padding: 12px;
            background-color: #fef0f0;
            border: 1px solid #fbc4c4;
            color: #f56c6c;
            border-radius: 4px;
            font-weight: 500;
        }
        .exam-area {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .exam-area h3 {
            color: #303133;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ebeef5;
        }
        .question {
            padding: 15px 0;
        }
        .question p {
            color: #303133;
            margin-bottom: 10px;
        }
        .question textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            resize: vertical;
            font-size: 14px;
        }
        .tips {
            background: #eef1f6;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            padding: 20px;
            color: #606266;
        }
        .tips h3 {
            color: #303133;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>监控模拟页面</h1>
        </div>

        <div class="status-panel">
            <h3>监控状态面板</h3>
            <div class="status-item">
                <span>页面可见状态 (visibilityState):</span>
                <span id="visibility-state">visible</span>
            </div>
            <div class="status-item">
                <span>页面是否隐藏 (document.hidden):</span>
                <span id="hidden-state">false</span>
            </div>
            <div class="status-item">
                <span>窗口焦点状态 (hasFocus):</span>
                <span id="focus-state">true</span>
            </div>
            <div class="status-item">
                <span>切屏次数:</span>
                <span id="cut-count">0</span>
            </div>
            <div id="cut-alert" class="alert" style="display: none;">
                ⚠️ 检测到切屏行为！当前切屏次数已累计
            </div>
        </div>

        <div class="exam-area">
            <h3>模拟区域</h3>
            <div class="question">
                <p>1. 请输入任意字符：</p>
                <textarea placeholder="在这里输入..." rows="15"></textarea>
            </div>
        </div>

        <div class="tips">
            <h3>说明</h3>
        </div>
    </div>

    <script>
        let cutScreenCount = 0;
        window.addEventListener('blur', () => {
            cutScreenCount++;
            updateStatus();
            const alertEl = document.getElementById('cut-alert');
            alertEl.style.display = 'block';
            console.log('检测到切屏，当前次数：', cutScreenCount);
            // cutScreenReport({ count: cutScreenCount });
        });

        window.addEventListener('focus', () => {
            updateStatus();
            console.log('窗口重新激活');
        });
        document.addEventListener('visibilitychange', () => {
            updateStatus();
            if(document.hidden) {
                cutScreenCount++;
                const alertEl = document.getElementById('cut-alert');
                alertEl.style.display = 'block';
                console.log('检测到页面隐藏，切屏次数：', cutScreenCount);
            }
        });

        // 更新状态面板
        function updateStatus() {
            document.getElementById('visibility-state').textContent = document.visibilityState;
            document.getElementById('hidden-state').textContent = document.hidden;
            document.getElementById('focus-state').textContent = document.hasFocus();
            document.getElementById('cut-count').textContent = cutScreenCount;
        }

        // 定期更新状态
        setInterval(updateStatus, 100);

        // 初始化状态
        updateStatus();
    </script>
</body>
</html>
